        <p>js封装的一个计时器的插件，start()开始计时，end()结束计时，返回一次计时的时间。<br><a id="more"></a></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><span class="line">;(function(undefined)&#123;</span><br><span class="line">	&quot;use strict&quot;;</span><br><span class="line">	var _global, timer, time;</span><br><span class="line">	var plugin = &#123;</span><br><span class="line">		start: function()&#123;</span><br><span class="line">			time = 0;</span><br><span class="line">			timer = setInterval(function()&#123;</span><br><span class="line">				 time ++;</span><br><span class="line">				 console.log(time)</span><br><span class="line">			&#125;, 1000);</span><br><span class="line">		&#125;,</span><br><span class="line">		end: function()&#123;</span><br><span class="line">			clearInterval(timer);</span><br><span class="line">			return time;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	// 最后将插件对象暴露给全局对象</span><br><span class="line">    _global = (function()&#123; return this || (0, eval)(&apos;this&apos;); &#125;());</span><br><span class="line">    if (typeof module !== &quot;undefined&quot; &amp;&amp; module.exports) &#123;</span><br><span class="line">        module.exports = plugin;</span><br><span class="line">    &#125; else if (typeof define === &quot;function&quot; &amp;&amp; define.amd) &#123;</span><br><span class="line">        define(function()&#123;return plugin;&#125;);</span><br><span class="line">    &#125; else &#123;</span><br><span class="line">        !(&apos;plugin&apos; in _global) &amp;&amp; (_global.plugin = plugin);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;());</span><br></pre></td></tr></table></figure>
